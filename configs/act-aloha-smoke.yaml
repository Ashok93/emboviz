# emboviz smoke run — ACT on ALOHA-sim transfer-cube, 4 frames.
#
#   emboviz analyze --config configs/act-aloha-smoke.yaml
#
# Public checkpoint + the dataset it was trained on. This checkpoint predates
# the lerobot v0.5 processor split, so it carries no policy_preprocessor.json;
# its normalization statistics are baked into model.safetensors and the ACT
# adapter reconstructs them. ACT consumes vision + state, no language.
# camera_mapping points at the raw dataset key the checkpoint expects.

model:
  adapter: act
  kwargs:
    checkpoint: lerobot/act_aloha_sim_transfer_cube_human
    camera_mapping:
      primary: observation.images.top

dataset:
  format: lerobot
  path: lerobot/aloha_sim_transfer_cube_human

  cameras:
    primary: observation.images.top

  state:
    key: observation.state
    convention: joint_angles

  action:
    key: action

  instruction:
    from: tasks

analysis:
  episodes: "0"
  frame_start: 0
  n_frames: 4
  mask_query: "the red cube"
  detector: sam3
  fills: [channel_mean, gaussian_blur, lama_inpaint]   # on-manifold fill active
  diagnostics: all                                     # language-dependent ones auto-skip (ACT has no language)
  sensitivity_grid_side: 3

output: ./report/act-aloha-smoke
