# emboviz run — OpenVLA-OFT (LIBERO-spatial) ATTENTION-MAP ONLY, full episode.
#
#   emboviz analyze --config configs/oft-libero-spatial-attn.yaml
#
# Comparison run for the GR00T attention overlay: SAME LIBERO-spatial scenes,
# but OFT exposes transformer attention by default (no checkpoint conversion).
# Runs ONLY the attention diagnostic (per-frame overlay + drift) over an
# entire, non-zero episode. If OFT's attention localises on the manipulated
# object while GR00T's sits on the image borders, the overlay pipeline is
# sound and GR00T's attention is genuinely diffuse/sink-dominated.

model:
  adapter: oft
  kwargs:
    checkpoint: moojink/openvla-7b-oft-finetuned-libero-spatial
    unnorm_key: libero_spatial_no_noops
    num_images: 2            # OFT consumes primary + wrist
    use_proprio: true
    use_l1_regression: true
    center_crop: true

dataset:
  format: lerobot
  path: lerobot/libero_spatial_image     # official LIBERO-Spatial suite, LeRobot v3.0

  cameras:
    primary: observation.images.image
    wrist:   observation.images.wrist_image

  state:
    key: observation.state
    convention: ee_pose      # [x, y, z, qx, qy, qz, qw, gripper]

  action:
    key: action

  gripper:
    source: 7
    kind: parallel_jaw
    units: unit
    range: [0.0, 1.0]

  instruction:
    from: tasks

analysis:
  episodes: "100"            # a random, non-zero episode
  frame_start: 0
  n_frames: -1               # ENTIRE episode (all frames)
  diagnostics: [attention]   # attention map / drift only

output: ./report/oft-libero-spatial-attn
