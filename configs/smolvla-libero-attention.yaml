# emboviz attention-only run — SmolVLA (lerobot/smolvla_libero) on LIBERO, full episode.
#
#   emboviz analyze --config configs/smolvla-libero-attention.yaml
#
# Attention only: per-frame prefix self-attention overlay (last instruction
# token -> image) across every frame of one episode. Memorization / modality
# / sensitivity are disabled, so there is no SAM3 / LaMa / modality-pool cost.

model:
  adapter: smolvla
  kwargs:
    checkpoint: lerobot/smolvla_libero
    camera_mapping:
      primary: observation.images.image
      wrist:   observation.images.image2

dataset:
  format: lerobot
  path: lerobot/libero

  cameras:
    primary: observation.images.image
    wrist:   observation.images.image2

  state:
    key: observation.state
    convention: ee_pose

  action:
    key: action

  instruction:
    from: tasks

analysis:
  episodes: "0"
  frame_start: 0
  n_frames: -1            # all frames of the episode
  diagnostics: [attention]

output: ./report/smolvla-libero-attention
