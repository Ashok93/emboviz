# emboviz smoke run — SmolVLA (lerobot/smolvla_libero) on LIBERO, 1 frame.
#
#   emboviz analyze --config configs/smolvla-libero-smoke.yaml
#
# Verified-compatible pair: the smolvla_libero finetune + the lerobot/libero
# dataset it was trained on. camera_mapping points at the RAW dataset keys the
# checkpoint's preprocessor expects (it renames image->camera1, image2->camera2
# and normalizes with the model's own stats). lama_inpaint is enabled so the
# on-manifold memorization fill is exercised.

model:
  adapter: smolvla
  kwargs:
    checkpoint: lerobot/smolvla_libero
    camera_mapping:
      primary: observation.images.image
      wrist:   observation.images.image2

dataset:
  format: lerobot
  path: lerobot/libero

  cameras:
    primary: observation.images.image
    wrist:   observation.images.image2

  state:
    key: observation.state
    convention: ee_pose

  action:
    key: action

  instruction:
    from: tasks

analysis:
  episodes: "0"
  frame_start: 0
  n_frames: 4                        # >1 so attention-drift + chunk + modality produce verdicts
  mask_query: "the white mug"        # ep0 task references mugs/plates
  detector: sam3
  fills: [channel_mean, gaussian_blur, lama_inpaint]   # on-manifold fill active
  diagnostics: all                   # memorization, sensitivity, modality, chunk, attention
  sensitivity_grid_side: 3

output: ./report/smolvla-libero-smoke
