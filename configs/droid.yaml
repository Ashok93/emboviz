# emboviz run config — DROID (LeRobot v3.0) for Cosmos world-model trust.
#
#   uv run python -m emboviz.world_models.stage2_cli \
#     --config configs/droid.yaml --episode 0 \
#     --world-model cosmos3 --server-url https://<podid>-8000.proxy.runpod.net \
#     --domain droid_lerobot --action-dim 10 --n-actions 16 --out outputs/cosmos_trust
#
# Loads a real DROID episode with the clean lerobot reader (runs on the Mac, no
# GPU). The Cosmos rollout + trust math then run against it. Keys are taken from
# the dataset's own info.json — DROID-Franka, codebase v3.0.
#
# DAVIAN-Robotics/droid_v3 stores cartesian, joints, and gripper as SEPARATE
# feature keys. The Cosmos droid_lerobot encoder needs the cartesian pose
# (state.key) and the gripper (gripper.key) — both mapped below.

model:
  # The trust driver loads the dataset + drives the world model; it does not run
  # this model. `mock` is the GPU-free built-in, here only to make the config valid.
  adapter: mock

dataset:
  format: lerobot
  path: DAVIAN-Robotics/droid_v3            # DROID Franka, LeRobot v3.0 (95k episodes; streams per-episode)

  cameras:                                  # model camera role -> this dataset's image key
    primary: observation.images.exterior_1_left   # main exterior view (the trust comparison view)
    exterior_2: observation.images.exterior_2_left
    wrist: observation.images.wrist_left

  state:
    key: observation.state.cartesian_position   # [x, y, z, roll, pitch, yaw] — the encoder's [xyz, euler]
    convention: ee_pose

  action:
    key: action.original                    # [x, y, z, roll, pitch, yaw, gripper] EE-space action
                                            # (the Cosmos encoder derives its actions from state, not this;
                                            #  declared so the reader exposes a meaningful logged action.)

  gripper:                                  # SEPARATE feature key (not packed in the cartesian state)
    key: action.gripper_position            # matches NVIDIA's gripper source for droid_lerobot (1 - g, normalized)
    kind: parallel_jaw
    units: unit
    range: [0.0, 1.0]

  instruction:
    from: tasks                             # falls back to the Cosmos default prompt if the episode has none

  extra:
    revision: main                          # droid_v3 has no version tag; load from the default branch
                                            # (lerobot defaults to a version-TAG lookup, which this repo lacks)

analysis:
  episodes: "0"                             # episode index to roll out
  frame_start: 0
  n_frames: -1                              # the reader loads the whole episode; the driver windows it
  frame_stride: 1                           # consecutive frames — pose deltas need the native cadence
  diagnostics: [attention]                  # unused by the trust driver; a valid value is required

output: ./outputs/cosmos_trust

# Runtime note (confirm on the first pod run, not a config field): Cosmos's DROID
# view_point is `concat_view` (wrist + two exteriors stitched). The trust
# comparison here runs on the single `primary` exterior view; aligning the
# conditioning/prediction to Cosmos's concat layout is a Stage-2 runtime follow-up.
