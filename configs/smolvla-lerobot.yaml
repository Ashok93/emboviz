# emboviz run config — SmolVLA on a LeRobot dataset.
#
#   emboviz analyze --config configs/smolvla-lerobot.yaml
#
# SmolVLA consumes vision + language instruction + robot state. Point
# checkpoint at your finetune (or the public base) and camera_mapping at its
# image-feature keys.

model:
  adapter: smolvla
  kwargs:
    checkpoint: lerobot/smolvla_base            # <-- your SmolVLA finetune (or the public base)
    # logical camera role -> the checkpoint's image-feature key. Must cover
    # exactly the checkpoint's image_features.
    camera_mapping:
      primary: observation.images.top
      wrist:   observation.images.wrist

dataset:
  format: lerobot
  path: your-org/your-smolvla-dataset           # <-- LeRobot v3.0 dataset matching the checkpoint

  cameras:
    primary: observation.images.top
    wrist:   observation.images.wrist

  state:
    key: observation.state
    convention: joint_angles                    # state it explicitly (joint_angles | ee_pose | ...)

  action:
    key: action

  gripper:
    source: 6
    kind: parallel_jaw
    units: unit
    range: [0.0, 1.0]

  instruction:
    from: tasks                                  # SmolVLA is language-conditioned — instruction is required

analysis:
  episodes: "0"
  frame_start: 0
  n_frames: 4
  mask_query: "the object"                       # <-- the manipulated object for the memorization mask
  detector: sam3
  diagnostics: all

output: ./report/smolvla-lerobot
