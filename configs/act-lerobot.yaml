# emboviz run config — ACT (Action Chunking Transformer) on a LeRobot dataset.
#
#   emboviz analyze --config configs/act-lerobot.yaml
#
# ACT consumes vision + robot state only (no language). Point checkpoint at
# your trained ACT policy and camera_mapping at its image-feature keys.

model:
  adapter: act
  kwargs:
    checkpoint: your-org/your-act-checkpoint    # <-- your trained ACT policy (HF repo id or local dir)
    # logical camera role -> the checkpoint's image-feature key. Must cover
    # exactly the checkpoint's image_features.
    camera_mapping:
      primary: observation.images.top
      wrist:   observation.images.wrist

dataset:
  format: lerobot
  path: your-org/your-act-dataset               # <-- LeRobot v3.0 dataset matching the checkpoint

  # logical camera role -> this dataset's image key (links the reader to the
  # same roles used in model.camera_mapping above).
  cameras:
    primary: observation.images.top
    wrist:   observation.images.wrist

  state:
    key: observation.state
    convention: joint_angles                    # ACT/ALOHA typically use joint angles — state it explicitly

  action:
    key: action

  gripper:
    source: 6
    kind: parallel_jaw
    units: unit
    range: [0.0, 1.0]

  # ACT ignores language; the binding is optional and only used to label the
  # episode. The memorization diagnostic masks mask_query below.
  instruction:
    from: tasks

analysis:
  episodes: "0"
  frame_start: 0
  n_frames: 4
  mask_query: "the object"                       # <-- the manipulated object for the memorization mask
  detector: sam3
  diagnostics: all

output: ./report/act-lerobot
