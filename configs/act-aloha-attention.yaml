# emboviz attention-only run — ACT on ALOHA-sim transfer-cube, full episode.
#
#   emboviz analyze --config configs/act-aloha-attention.yaml
#
# Attention only: per-frame decoder cross-attention overlay across every
# frame of one episode, for inspecting how ACT's attention moves over the
# whole trajectory. Memorization / modality / sensitivity are disabled, so
# there is no SAM3 / LaMa / modality-pool cost — only one attention forward
# per frame plus the one-time episode decode.

model:
  adapter: act
  kwargs:
    checkpoint: lerobot/act_aloha_sim_transfer_cube_human
    camera_mapping:
      primary: observation.images.top

dataset:
  format: lerobot
  path: lerobot/aloha_sim_transfer_cube_human

  cameras:
    primary: observation.images.top

  state:
    key: observation.state
    convention: joint_angles

  action:
    key: action

  instruction:
    from: tasks

analysis:
  episodes: "0"
  frame_start: 0
  n_frames: -1            # all frames of the episode
  diagnostics: [attention]

output: ./report/act-aloha-attention
