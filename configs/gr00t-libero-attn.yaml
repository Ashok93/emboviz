# emboviz run — GR00T-N1.7 (LIBERO) ATTENTION-MAP ONLY, full episode.
#
#   emboviz analyze --config configs/gr00t-libero-attn.yaml
#
# Same model + dataset as gr00t-libero.yaml, but runs ONLY the attention
# diagnostic (the per-frame attention overlay + drift) over an ENTIRE,
# non-zero episode — for scrubbing where the policy looks across the whole
# rollout. Attention-only is the lightest path (no modality pool, no
# sensitivity grid, no memorization masking, no detector).

model:
  adapter: gr00t
  kwargs:
    model_path: nvidia/GR00T-N1.7-LIBERO
    model_subfolder: libero_spatial
    embodiment_tag: LIBERO_PANDA
    device: "cuda:0"
    camera_mapping:
      primary: image
      wrist:   wrist_image

dataset:
  format: gr00t
  path: ~/data/libero_spatial_no_noops_gr00t

  cameras:
    primary: observation.images.image
    wrist:   observation.images.wrist_image

  state:
    key: observation.state
    convention: ee_pose

  action:
    key: action

  gripper:
    kind: parallel_jaw
    units: unit
    range: [0.0, 1.0]

  instruction:
    from: tasks

analysis:
  episodes: "137"            # a different (non-0) episode
  frame_start: 0
  n_frames: -1               # ENTIRE episode (all frames)
  diagnostics: [attention]   # attention map / drift only

output: ./report/gr00t-libero-attn
