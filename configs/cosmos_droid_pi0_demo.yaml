# π0-DROID flown inside Cosmos — the closed-loop stress test on DROID episode 312
# ("Pick the marker from the cup and put it on the table").
#
# π0-DROID is joint-space: it reads observation/joint_position (7) and emits joint
# deltas + an absolute gripper (action_horizon = 10). The bridge tracks the joint
# vector, forward-kinematics it to the panda_link8 pose (robot: franka_panda), and
# encodes that as Cosmos droid_lerobot conditioning.
#
#   uv sync --extra cosmos3 --extra robot
#   uv run python -m emboviz.world_models.dream_cli --config configs/cosmos_droid_pi0_demo.yaml --episode 312

model:
  adapter: mock                              # the dream driver doesn't run this; a valid value is required

dataset:
  format: lerobot
  path: DAVIAN-Robotics/droid_v3
  cameras:
    primary: observation.images.exterior_1_left
    exterior_2: observation.images.exterior_2_left
    wrist: observation.images.wrist_left
  state:
    key: observation.state.joint_position       # 7 Franka joint angles (radians) — π0's state
    convention: joint_angles
  action:
    key: action.original
  gripper:
    key: observation.state.gripper_position     # proprioceptive gripper, [0,1] (0=open)
    kind: parallel_jaw
    units: unit
    range: [0.0, 1.0]
  instruction:
    from: tasks
  extra:
    revision: main                           # droid_v3 has no version tag

analysis:
  episodes: "312"
  frame_start: 0
  n_frames: -1
  frame_stride: 1
  diagnostics: [attention]                   # unused by the dream driver; a valid value is required

  cosmos_stress:
    server_url: https://YOUR-COSMOS-POD-8000.proxy.runpod.net  # the running Cosmos3 world-model server
    domain: droid_lerobot
    action_dim: 10
    policy_adapter: pi0
    policy_kwargs: {config_name: pi0_droid}
    action_convention: droid_joint_velocity  # π0-DROID emits joint velocities (rad/s), not deltas
    control_hz: 15                            # DROID control rate; joints advance by velocity*(1/15)/step
    robot: franka_panda                      # forward kinematics: joints -> panda_link8 pose
    camera_map: {primary: exterior_left, wrist_left: wrist}   # π0 roles -> concat regions
    concat_cameras: {wrist: wrist, exterior_left: primary, exterior_right: exterior_2}
    concat_resolution: [352, 640]            # wrist panel H×W -> 528×640 concat, a clean
                                             # multiple of 16 so Cosmos does not round the
                                             # height (540->528) and corrupt the re-fed frame
    # Baseline (unperturbed): empty list -> the loop runs the recorded scene with
    # no edit. For the perturbed run, list an edit instruction, e.g.:
    #   perturbations: ["replace the marker in the cup with a spoon"]
    # (whole-frame, unmasked — Cosmos may repaint the entire scene). Mutually
    # exclusive with scene_swap below.
    perturbations: []
    # Masked counterfactual object swap (baseline-vs-swap, side by side in ONE
    # clip). SAM 3 locates ``mask_query`` per camera; a non-empty ``replace_query``
    # paints that object into the masked region via the sd-inpaint adapter (Stable
    # Diffusion text-guided inpainting), an empty one removes the object via LaMa.
    # Cameras with no confident detection keep their original image (the policy
    # needs all cameras to drive the dream); the per-camera status is recorded on
    # the clip so a partial swap is never presented as a full one. If NO camera
    # detects the target, the swap column is left blank and marked "not run".
    # Mutually exclusive with perturbations above.
    scene_swap:
      mask_query: "yellow marker"            # the object SAM 3 locates (SAM scores this >> "the marker")
      replace_query: "a bright red marker pen lying across the white cup"   # paint via sd-inpaint; "" -> remove via LaMa
      mask_dilation: 10                       # grow the mask so the new object has room
      edit_guidance_scale: 14                 # obey replace_query hard (else SD erases to background)
      edit_negative_prompt: "empty cup, plain white cup, nothing"   # forbid the erasure SD defaults to
    # Maximally reactive loop: the policy re-plans as often as possible, so the
    # policy (not the dream) drives the trajectory. Cosmos's video VAE compresses
    # time 4x, so a dream call emits frames only in quanta of 4 (num_frames =
    # 1 + 4N); 4 is the hard floor for the *prediction* horizon. We dream those 4
    # but COMMIT only the first one (execute_steps=1, receding horizon): the policy
    # re-plans on the next dreamed frame, and the committed frame is the least-
    # drifted one. Add turns (n_loop_steps) to cover the decisive window.
    # "Just right" balance vs the world model's autoregressive drift: each Cosmos
    # call generates a long COHERENT chunk (no intra-call drift), and we re-feed
    # (photocopy) only between calls — drift grows with n_loop_steps, which the
    # probe showed stays clean through ~3 re-conditioning cycles.
    # Full-episode closed loop, the proper FD chunk pattern (NVIDIA's robotics
    # recipe): π0 plans a chunk → Cosmos dreams the whole chunk → take the LAST
    # frame → π0 re-plans → repeat. π0 drives every action; Cosmos only renders.
    # 8 is the biggest VAE-on-grid chunk within π0-droid's 10-action horizon
    # (16 is the trained size, but the policy caps us; π0.5-droid would give 12).
    n_actions: 8                             # π0's chunk dreamed per call (1+4N on-grid)
    execute_steps: 8                         # commit the WHOLE chunk → re-feed the last frame
    # Dream ONE decisive moment, not the whole episode: seed just before a grasp
    # keyframe so Cosmos's faithful window (~1-2 chunks) lands ON the grasp, then
    # ride out the lift. 6 chunks x 8 = 48 frames ≈ 3.2 s at 15 fps. Select the
    # grasp with: --keyframe-kinds gripper_change --near-frame <grasp frame>.
    n_loop_steps: 6                          # ~48 frames ≈ 3.2 s clip
    lead_s: 0.6                              # seed ~9 frames before the grasp keyframe
    # reasoner_url omitted -> no verdict (this omni server returns images, not text)

output: ./outputs/cosmos_dream_312
