[project]
name = "emboviz"
version = "0.1.0"
description = "Emboviz — diagnostic and interpretability framework for embodied-AI policies (VLAs, diffusion policies, world models, humanoids). Apache 2.0."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10,<3.13"

dependencies = [
    # Core ML
    "torch>=2.2.0",
    "torchvision>=0.17.0",
    "numpy>=1.26,<2.0",
    # LeRobot — provides pretrained Diffusion Policy + pusht dataset
    "lerobot>=0.3.0",
    # Attribution
    "captum>=0.7.0",
    # Visualization
    "matplotlib>=3.8",
    "imageio>=2.34",
    "imageio-ffmpeg>=0.4.9",
    "Pillow>=10.0",
    # Utilities
    "tqdm>=4.66",
    "huggingface_hub>=0.24",
    "scikit-learn>=1.3", # linear probes (trainer.py)
    # Stage B (OpenVLA-7B + faithfulness)
    "transformers>=4.40,<4.50",
    "accelerate>=0.30",
    "scipy>=1.11",
    "timm>=0.9.10,<1.0", # OpenVLA's modeling code hard-checks this range
    "tokenizers>=0.19",
    "sentencepiece>=0.2",
    "rerun-sdk>=0.22.1",
    "mcap>=1.3.1",
]

[project.optional-dependencies]
# Each adapter ships its own dep group so users install only what their
# setup needs. Several adapters have incompatible transformers pins —
# install each in its own virtualenv when mixing.
openvla = [
    "transformers>=4.40,<4.50",
    "timm>=0.9.10,<1.0",
]
gr00t = [
    # NOTE: requires transformers>=4.57 which is INCOMPATIBLE with openvla.
    # Use a separate virtualenv. Isaac-GR00T is git-only; install with:
    #   uv pip install --no-deps git+https://github.com/NVIDIA/Isaac-GR00T.git
    "transformers>=4.57",
    "diffusers",
    "dm-tree",
    "tyro",
    "lmdb",
    "msgpack",
    "msgpack-numpy",
    "peft",
    "termcolor",
    "omegaconf",
    "jsonlines",
    "gymnasium",
    "einops",
    "albumentations",
    "opencv-python-headless",
    "kornia",
]
openvla-oft = [
    # NOTE: requires the moojink/transformers-openvla-oft fork, NOT mainline
    # transformers. Incompatible with both `openvla` and `gr00t`. Use a
    # separate virtualenv. See https://github.com/moojink/openvla-oft for the
    # full install recipe.
]
pi0 = [
    # NOTE: π0 checkpoints on HF (lerobot/pi0_base, lerobot/pi05_base) require
    # a newer LeRobot than `openvla` is compatible with. Use a separate
    # virtualenv. See https://huggingface.co/lerobot/pi0_base.
    "lerobot>=0.5",
]

[project.scripts]
emboviz-run = "emboviz.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["emboviz"]

# Make uv pick the right torch wheel automatically.
# - Linux + CUDA (Vast.ai): falls back to PyPI default, which is CUDA-enabled.
# - macOS: PyPI default is CPU/MPS.
# If a specific CUDA version is needed on Vast.ai, set TORCH_INDEX in setup_vastai.sh.
