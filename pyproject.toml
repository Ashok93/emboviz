[project]
name = "emboviz"
version = "0.3.0"
description = "Emboviz — the X-ray for deployed VLA policies. Plain-English diagnostics on failing real-robot episodes."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10,<3.13"

# ──────────────────────────────────────────────────────────────────────
# Core install. Tiny, modern, clean — NO model dependencies live here.
# Each VLA adapter is a separate package (emboviz-openvla, emboviz-oft,
# emboviz-pi0, emboviz-gr00t, emboviz-sam3). The user installs core
# plus whichever adapters they actually want. Heavy/conflicting deps
# (torch, transformers per model, lerobot 0.3.x, etc.) live in their
# adapter's Ray-managed runtime_env — never in the user's main venv.
#
# This is why dependency hell never happens to a user of this package:
# core has no torch, no transformers, no lerobot, no model-specific
# anything. Adding a new VLA family (ACT, Diffusion Policy, RT-X, RDT)
# = publish a new emboviz-<adapter> package. Core never changes.
# ──────────────────────────────────────────────────────────────────────
dependencies = [
    # plumbing — pure-Python or fast-imported data wrangling
    "numpy>=1.26",
    "scipy>=1.11",
    "pyarrow>=14",
    "Pillow>=10.0",
    "tqdm>=4.66",
    "click>=8.1",
    "pydantic>=2.7",
    "huggingface_hub>=0.24",
    # report rendering
    "matplotlib>=3.8",
    "jinja2>=3.1",
    # deployment recording readers (small, no torch)
    "mcap>=1.2",
    "mcap-ros2-support>=0.5",
    "mcap-protobuf-support>=0.5",
    # tabular / scientific dataset readers
    "h5py>=3.10",
    # interactive Rerun export. Supports both 0.22 (Scalar singular) and
    # 0.23+ (Scalars + unified set_time) via a small compat shim in
    # exporters/rerun.py.
    "rerun-sdk>=0.22",
    # video / image media
    "imageio>=2.34",
    "imageio-ffmpeg>=0.4.9",
    # COCO RLE mask decoder (used by both the SAM 3 client and the
    # CocoAnnotationConnector for user-supplied per-frame annotations).
    "pycocotools>=2.0",
    # ── Ray for per-adapter actor isolation ─────────────────────────
    # Each adapter is a Ray actor spawned with runtime_env={"py_executable":
    # "/path/to/isolated/venv/bin/python"}. The actor process loads its
    # adapter's heavy deps; core never touches them. Tensors flow
    # through Ray's Plasma object store (zero-copy for numpy arrays via
    # pickle protocol 5). Ray's Apache-2.0 and battle-tested at scale.
    "ray[default]>=2.40",
]

[project.optional-dependencies]

# ────────── Optional heavy dataset family ──────────
# Only pulled in by users who actually have RLDS / Open-X-Embodiment
# data. Adds tensorflow_datasets + tensorflow-cpu (~500 MB) so we keep
# it out of the core deps.
rlds = [
    "tensorflow-datasets>=4.9",
    "tensorflow-cpu>=2.15",
    "rlds>=0.1.8",
]

# ────────── Dev / test ──────────
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "ruff>=0.5",
    "mypy>=1.10",
]

# NOTE: there are no longer per-adapter extras. Adapters are separate
# distributions (emboviz-openvla, emboviz-oft, etc.) the user installs
# alongside emboviz. This eliminates every cross-adapter dep conflict
# we ever hit, because each adapter's heavy deps live in its own
# Ray-managed runtime venv, never in the user's main env.

[project.scripts]
emboviz = "emboviz.cli:main"

[project.entry-points."emboviz.adapters"]
# Adapter packages register themselves here so emboviz can auto-discover
# what's installed. Each entry maps a CLI name (e.g. "openvla") to the
# fully-qualified module:Class of the adapter spec. The spec class
# declares: runtime_env, actor class, default config.
#
# This dict is INTENTIONALLY EMPTY in core — each adapter package adds
# its own entry via its own pyproject [project.entry-points...] block.

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
